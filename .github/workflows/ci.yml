name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check GitHub Actions pins
        run: python3 scripts/check_github_actions_pins.py

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r backend/requirements.txt

      - name: Install Python dependency auditor
        run: python -m pip install pip-audit==2.10.1

      - name: Audit Python production dependencies
        run: python scripts/pip_audit_policy.py

      - name: Compile backend
        working-directory: backend
        run: python -m compileall app

      - name: Run backend tests
        working-directory: backend
        run: python -m unittest discover tests -v

      - name: Check migration files
        run: python scripts/migrate_db.py --list

      - name: Check Docker Compose config
        run: docker compose config --quiet

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit production dependencies
        run: python3 scripts/npm_audit_policy.py

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  container-security:
    name: Container OS Security
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build first-party images
        run: |
          docker build --file deploy/docker/backend.Dockerfile --tag firstrag-backend:ci .
          docker build --file deploy/docker/frontend.Dockerfile --tag firstrag-frontend:ci .

      - name: Scan backend OS packages
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: firstrag-backend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os
          severity: CRITICAL,HIGH
          scanners: vuln
          version: v0.72.0

      - name: Scan frontend OS packages
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: firstrag-frontend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os
          severity: CRITICAL,HIGH
          scanners: vuln
          version: v0.72.0
          skip-setup-trivy: true
