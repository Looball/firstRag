# FirstRAG public demo reverse proxy.
#
# This syntax-checkable config is intended for a trusted TLS terminator in
# front of Nginx, such as Cloudflare Tunnel or a managed load balancer. For
# direct public TLS termination on this Nginx instance, use
# firstrag-public-demo.tls.conf.example as the server-block template instead.

server {
    listen 80;
    server_name demo.example.com;

    include /etc/nginx/conf.d/firstrag-proxy-locations.inc;
}
