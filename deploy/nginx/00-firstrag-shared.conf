# FirstRAG shared Nginx settings.
#
# This file is loaded in the nginx http context from /etc/nginx/conf.d/*.conf.
# Keep real domains, certificate paths, API keys, and secrets out of this file.

map $http_upgrade $firstrag_connection_upgrade {
    default upgrade;
    "" close;
}

limit_req_zone $binary_remote_addr zone=firstrag_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=firstrag_chat:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=firstrag_upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=firstrag_vector:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=firstrag_model:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=firstrag_api:10m rate=120r/m;

upstream firstrag_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}
