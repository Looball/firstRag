name: firstrag

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-first_rag}
      POSTGRES_USER: ${POSTGRES_USER:-firstrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firstrag-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    image: firstrag-backend:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-postgresql://${POSTGRES_USER:-firstrag}:${POSTGRES_PASSWORD:-firstrag-password}@postgres:5432/${POSTGRES_DB:-first_rag}}"
      VECTOR_STORE_PATH: ${VECTOR_STORE_PATH:-/app/vector_db/chroma}
      RERANKER_MODEL_PATH: ${RERANKER_MODEL_PATH:-/app/models/rerankers/bge-reranker-base}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${UPLOADS_DIR:-./uploads}:/app/uploads
      - ${VECTOR_DB_DIR:-./vector_db}:/app/vector_db
      - ${MODELS_DIR:-./models}:/app/models:ro
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    image: firstrag-backend:latest
    restart: "no"
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-postgresql://${POSTGRES_USER:-firstrag}:${POSTGRES_PASSWORD:-firstrag-password}@postgres:5432/${POSTGRES_DB:-first_rag}}"
    command: ["python", "/app/scripts/migrate_db.py"]
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: firstrag-backend:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-postgresql://${POSTGRES_USER:-firstrag}:${POSTGRES_PASSWORD:-firstrag-password}@postgres:5432/${POSTGRES_DB:-first_rag}}"
      VECTOR_STORE_PATH: ${VECTOR_STORE_PATH:-/app/vector_db/chroma}
      RERANKER_MODEL_PATH: ${RERANKER_MODEL_PATH:-/app/models/rerankers/bge-reranker-base}
    command: ["python", "-m", "app.workers.vector_index_worker"]
    volumes:
      - ${UPLOADS_DIR:-./uploads}:/app/uploads
      - ${VECTOR_DB_DIR:-./vector_db}:/app/vector_db
      - ${MODELS_DIR:-./models}:/app/models:ro
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_ORIGIN: http://backend:8000
      BACKEND_API_PREFIX: ${BACKEND_API_PREFIX:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    logging: *default-logging
    depends_on:
      - backend

volumes:
  postgres_data:
